<!-- Category Header -->
<section class="category-header">
  <div class="container">
    <h1>Men's Shoes</h1>
    <p>Premium footwear for the modern gentleman</p>
  </div>
</section>

<!-- Products -->
<section class="category-products">
  <div class="container">
    <div class="product-grid" id="men-products-grid">
      <!-- Products will be loaded here -->
    </div>
  </div>

<footer>

  </div>

<script src="script.js"></script>
<script>
// Load men's products
document.addEventListener('DOMContentLoaded', function() {
    loadMenProducts();
});

function loadMenProducts() {
    const menGrid = document.getElementById('men-products-grid');
    const menShoes = shoes.filter(shoe => shoe.category === 'men' || shoe.category === 'formal' || shoe.category === 'sports');

    menShoes.forEach(shoe => {
        const productCard = createProductCard(shoe);
        menGrid.appendChild(productCard);
    });
}
</script>
