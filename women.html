<!-- Category Header -->

  <div class="container">
    <h1>Women's Shoes</h1>
    <p>Elegant and comfortable footwear for every occasion</p>
  </div>
</section>

<!-- Products -->
<section class="category-products">
  <div class="container">
    <div class="product-grid" id="women-products-grid">
      <!-- Products will be loaded here -->
    </div>
  </div>
</section>

<!-- Footer -->

  </div>

<script src="script.js"></script>
<script>
// Load women's products
document.addEventListener('DOMContentLoaded', function() {
    loadWomenProducts();
});

function loadWomenProducts() {
    const womenGrid = document.getElementById('women-products-grid');
    const womenShoes = shoes.filter(shoe => shoe.category === 'women' || shoe.category === 'sneakers' || shoe.category === 'sandals');

    womenShoes.forEach(shoe => {
        const productCard = createProductCard(shoe);
        womenGrid.appendChild(productCard);
    });
}
</script>
